<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Counter</title>
    <link rel="stylesheet" href="styles.css"></link>
</head>

<body>
    <main>
        <div class="container">
            <h1>Real-Time Character Counter</h1>
            <textarea id="text-input" maxlength="50" placeholder="Type something here..."rows="4">

            </textarea>
            <p id="char-count">Character Count: <span id="charCount">0</span>/50</p>
        </div>
    </main>

    <footer>
        <p>Created by Anastasiia Dekret with 🤎 as a part of JavaScript certification</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
