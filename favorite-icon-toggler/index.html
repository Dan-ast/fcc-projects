<!DOCTYPE html>

<head>

    <title>Favorite Icon Toggler</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main>
      <div>
        <h1>Art Supplies</h1>
        <ul class="item-list">

            <button id="favoriteIcon2" class="favorite-icon">🤍</button>

          </li>
        </ul>
      </div>
    </main>

    <footer class="footer">
        <p>Created with <span class="heart">❤️</span> by Anastasiia Dekret as part of 
            <a href="https://www.freecodecamp.org/learn/javascript-v9/#lab-favorite-icon-toggler"

    </footer>
    <script src="script.js"></script>

</html>
